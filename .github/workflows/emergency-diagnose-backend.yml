name: Emergency Diagnose Backend

on:
  workflow_dispatch:

jobs:
  diagnose-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Collect backend diagnostics
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p 22 -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=10 -o ServerAliveCountMax=2"
          timeout 240s ssh $SSH_OPTS root@101.42.94.41 "bash -s" <<'REMOTE'
          set +e
          APP_DIR="/www/wwwroot/wangkejava"
          APP_NAME="wangkejava.jar"
          APP_PORT="8007"

          echo "::group::basic"
          date
          hostname
          uptime
          who -b || true
          free -m
          df -h
          uname -a
          echo "::endgroup::"

          echo "::group::processes and ports"
          ps -eo pid,ppid,user,stat,pcpu,pmem,etime,args --sort=-pcpu | head -35
          ss -lntp | grep -E "(:$APP_PORT|:80|:443|:3306|:6379)" || true
          pgrep -af "$APP_DIR/$APP_NAME" || true
          echo "::endgroup::"

          echo "::group::service status"
          systemctl is-enabled wangkejava.service || true
          systemctl is-active wangkejava.service || true
          systemctl status wangkejava.service --no-pager -l || true
          echo "::endgroup::"

          echo "::group::journal"
          journalctl -u wangkejava.service -n 220 --no-pager -o short-iso || true
          echo "::endgroup::"

          echo "::group::app files"
          ls -lah "$APP_DIR" || true
          ls -lah "$APP_DIR/logs" || true
          stat "$APP_DIR/$APP_NAME" || true
          if [ -x "$APP_DIR/run-wangkejava.sh" ]; then
            echo "--- run script, masked ---"
            sed -E 's/(PASSWORD|password|pwd|PASS|pass)([[:space:]]*=[[:space:]]*)[^[:space:]]+/\1\2***MASKED***/g' "$APP_DIR/run-wangkejava.sh" | head -160
          fi
          echo "::endgroup::"

          echo "::group::app logs"
          for f in "$APP_DIR"/logs/*.log "$APP_DIR"/logs/**/*.log; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            tail -n 220 "$f"
          done
          echo "::endgroup::"

          echo "::group::dependencies"
          for svc in mysqld mysql mariadb redis redis-server nginx; do
            systemctl is-active "$svc" >/dev/null 2>&1 && systemctl status "$svc" --no-pager -l | head -40
          done
          java -version
          curl -svm 8 "http://127.0.0.1:$APP_PORT/captchaImage" 2>&1 | head -80
          echo "::endgroup::"
          REMOTE
