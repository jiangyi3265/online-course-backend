name: Emergency Keep Wangke Backend Only

on:
  workflow_dispatch:

jobs:
  keep-wangke-only:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Stop non-wangke Java backends
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p 22 -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=30 -o ConnectionAttempts=2 -o ServerAliveInterval=10 -o ServerAliveCountMax=2"
          timeout 300s ssh $SSH_OPTS root@101.42.94.41 "bash -s" <<'REMOTE'
          set -euo pipefail

          TARGETS=(
            "/www/wwwroot/gljava/ruoyi-admin.jar"
            "/www/wwwroot/jzjava/ruoyi-admin.jar"
            "/www/wwwroot/wangbajava/wangba.jar"
            "/www/wwwroot/dyjava/dy.jar"
          )

          UNIT_DIRS=(
            "/etc/systemd/system"
            "/usr/lib/systemd/system"
            "/lib/systemd/system"
          )

          find_units_for_target() {
            target="$1"
            for dir in "${UNIT_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              grep -RIl -- "$target" "$dir" 2>/dev/null || true
            done | sed 's#^\./##' | sort -u
          }

          echo "::group::before"
          date
          ps -eo pid,ppid,pcpu,pmem,etime,args --sort=-pcpu | grep -E 'java|PID' | grep -v grep || true
          ss -lntp | grep -E ':(8007|8082|9090|3306|6379)' || true
          echo "::endgroup::"

          echo "::group::disable non-wangke services"
          systemctl daemon-reload || true
          for target in "${TARGETS[@]}"; do
            units="$(find_units_for_target "$target" || true)"
            if [ -z "$units" ]; then
              echo "no systemd unit found for $target"
              continue
            fi
            while IFS= read -r unit_file; do
              [ -n "$unit_file" ] || continue
              unit_name="$(basename "$unit_file")"
              if [ "$unit_name" = "wangkejava.service" ]; then
                echo "skip wangke service $unit_name"
                continue
              fi
              echo "stop+disable $unit_name for $target ($unit_file)"
              systemctl stop "$unit_name" || true
              systemctl disable "$unit_name" || true
            done <<< "$units"
          done
          echo "::endgroup::"

          for target in "${TARGETS[@]}"; do
            pids="$(pgrep -f "$target" || true)"
            if [ -z "$pids" ]; then
              echo "no process for $target"
              continue
            fi
            echo "TERM $target -> $pids"
            kill -TERM $pids || true
          done

          sleep 8

          for target in "${TARGETS[@]}"; do
            pids="$(pgrep -f "$target" || true)"
            if [ -n "$pids" ]; then
              echo "KILL $target -> $pids"
              kill -KILL $pids || true
            fi
          done

          echo "::group::after"
          ps -eo pid,ppid,pcpu,pmem,etime,args --sort=-pcpu | grep -E 'java|PID' | grep -v grep || true
          ss -lntp | grep -E ':(8007|8082|9090|3306|6379)' || true
          echo "::endgroup::"
          REMOTE
