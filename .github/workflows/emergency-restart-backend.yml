name: Emergency Restart Backend

on:
  workflow_dispatch:

jobs:
  restart-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Restart wangke backend
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p 22 -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=20 -o ConnectionAttempts=1 -o ServerAliveInterval=10 -o ServerAliveCountMax=2"
          for i in $(seq 1 12); do
            echo "restart attempt $i"
            if timeout 45s ssh $SSH_OPTS root@101.42.94.41 "bash -s" <<'REMOTE'
          set -euo pipefail
          APP_DIR="/www/wwwroot/wangkejava"
          APP_NAME="wangkejava.jar"
          APP_PORT="8007"
          JAVA_HOME="/usr/lib/jvm/java-17-konajdk"

          date
          uptime || true
          free -m || true

          if command -v systemctl >/dev/null 2>&1 && [ -d /run/systemd/system ]; then
            systemctl restart wangkejava.service || true
          fi

          sleep 6
          if ! curl -sS -m 10 "http://127.0.0.1:$APP_PORT/captchaImage" >/dev/null 2>&1; then
            PID="$(pgrep -f "$APP_DIR/$APP_NAME" || true)"
            if [ -n "$PID" ]; then
              kill -TERM $PID || true
              sleep 5
            fi
            if [ -x "$APP_DIR/run-wangkejava.sh" ]; then
              nohup "$APP_DIR/run-wangkejava.sh" >/dev/null 2>&1 &
            else
              JAVA_BIN="$JAVA_HOME/bin/java"
              [ -x "$JAVA_BIN" ] || JAVA_BIN="$(command -v java)"
              mkdir -p "$APP_DIR/logs" "$APP_DIR/uploadPath"
              nohup "$JAVA_BIN" -Dname="$APP_NAME" -Duser.timezone=Asia/Shanghai -Xms512m -Xmx1024m -jar "$APP_DIR/$APP_NAME" --ruoyi.profile="$APP_DIR/uploadPath" --server.port="$APP_PORT" > "$APP_DIR/logs/${APP_NAME%.jar}.log" 2>&1 &
            fi
            sleep 10
          fi

          curl -sS -m 15 "http://127.0.0.1:$APP_PORT/captchaImage" | head -c 200
          REMOTE
            then
              exit 0
            fi
            sleep 10
          done
          exit 1
