name: Deploy Wangke Java Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-wangkejava-service
  cancel-in-progress: true

env:
  DEPLOY_HOST: 101.42.94.41
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  APP_DIR: /www/wwwroot/wangkejava
  APP_NAME: wangkejava.jar
  LEGACY_APP_NAME: ruoyi-admin.jar
  APP_PORT: "8007"
  SERVER_JAVA_HOME: /usr/lib/jvm/java-17-konajdk

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload source archive
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SCP_OPTS="-O -i ~/.ssh/deploy_key -P $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          SOURCE_ARCHIVE="wangkejava-source.tar.gz"

          git archive --format=tar.gz --output="$SOURCE_ARCHIVE" "$GITHUB_SHA"
          test -s "$SOURCE_ARCHIVE"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$RELEASE_DIR/source' '$APP_DIR/logs' '$APP_DIR/uploadPath'"
          timeout 2m scp $SCP_OPTS "$SOURCE_ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/$SOURCE_ARCHIVE"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf '$RELEASE_DIR/$SOURCE_ARCHIVE' -C '$RELEASE_DIR/source'"
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"

      - name: Build release on server
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "RELEASE_DIR='$RELEASE_DIR' APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          SOURCE_DIR="$RELEASE_DIR/source"
          test -d "$SOURCE_DIR"

          if [ -x "$JAVA_HOME/bin/java" ]; then
            export JAVA_HOME
            export PATH="$JAVA_HOME/bin:$PATH"
          fi

          cd "$SOURCE_DIR"
          mvn -B -pl ruoyi-admin -am package -DskipTests
          test -f "ruoyi-admin/target/$APP_NAME"
          cp "ruoyi-admin/target/$APP_NAME" "$APP_DIR/$APP_NAME.tmp"
          mv "$APP_DIR/$APP_NAME.tmp" "$APP_DIR/$APP_NAME"
          REMOTE

      - name: Ensure database
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "RELEASE_DIR='$RELEASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          if [ -z "$MYSQL_ROOT_PASSWORD" ]; then
            echo "mysql root password not detected, skip database bootstrap"
            exit 0
          fi

          DB_EXISTS="$(MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -N -e "show databases like 'ha'" || true)"
          if [ "$DB_EXISTS" != "ha" ]; then
            test -f "$RELEASE_DIR/source/sql/ry_20250522.sql"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -e "create database ha default character set utf8mb4 collate utf8mb4_general_ci"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot ha < "$RELEASE_DIR/source/sql/ry_20250522.sql"
          fi
          REMOTE

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' LEGACY_APP_NAME='$LEGACY_APP_NAME' APP_PORT='$APP_PORT' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"
          JAVA_BIN=""
          if [ -x "$JAVA_HOME/bin/java" ]; then
            JAVA_BIN="$JAVA_HOME/bin/java"
          elif command -v java >/dev/null 2>&1; then
            JAVA_BIN="$(command -v java)"
          else
            echo "java runtime not found"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"

          for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
            [ -n "$app" ] || continue
            PID="$(pgrep -f "$APP_DIR/$app" || true)"
            if [ -n "$PID" ]; then
              kill -TERM $PID || true
            fi
          done

          for i in $(seq 1 30); do
            RUNNING=""
            for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
              [ -n "$app" ] || continue
              if pgrep -f "$APP_DIR/$app" >/dev/null 2>&1; then
                RUNNING=1
              fi
            done
            [ -z "$RUNNING" ] && break
            sleep 1
          done

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1 || pgrep -f "$APP_DIR/$LEGACY_APP_NAME" >/dev/null 2>&1; then
            echo "old java process is still running"
            exit 1
          fi

          cd "$APP_DIR"
          if [ -n "$MYSQL_ROOT_PASSWORD" ]; then
            export SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$MYSQL_ROOT_PASSWORD"
          fi

          nohup "$JAVA_BIN" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            > "$LOG_FILE" 2>&1 &

          for i in $(seq 1 40); do
            if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
              echo "java process exited"
              tail -n 120 "$LOG_FILE" || true
              exit 1
            fi

            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "service started with http code $HTTP_CODE"
              exit 0
            fi
            sleep 2
          done

          echo "service did not respond on port $APP_PORT"
          tail -n 120 "$LOG_FILE" || true
          exit 1
          REMOTE
