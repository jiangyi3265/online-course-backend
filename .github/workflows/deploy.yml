name: Deploy Java Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-java-service
  cancel-in-progress: true

env:
  DEPLOY_HOST: 101.42.94.41
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  APP_DIR: /www/wwwroot/wangkejava
  APP_NAME: ruoyi-admin.jar
  APP_PORT: "8007"
  SERVER_JAVA_HOME: /usr/lib/jvm/java-8-konajdk-8.0.25-1.oc9

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload source
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          SRC_DIR="$APP_DIR/releases/$GITHUB_SHA"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$SRC_DIR' '$APP_DIR/logs' '$APP_DIR/uploadPath'"
          git archive --format=tar.gz HEAD | timeout 120s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$SRC_DIR'"
          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"

      - name: Build jar on server
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' SRC_DIR='$SRC_DIR' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail
          export PATH="$JAVA_HOME/bin:$PATH"

          if [ ! -x "$JAVA_HOME/bin/javac" ]; then
            echo "Java 8 JDK not found at $JAVA_HOME"
            exit 1
          fi
          if ! command -v mvn >/dev/null 2>&1; then
            echo "mvn command not found on server"
            exit 1
          fi

          cd "$SRC_DIR"
          mvn -B -pl ruoyi-admin -am package -DskipTests
          cp "ruoyi-admin/target/$APP_NAME" "$APP_DIR/$APP_NAME.tmp"
          mv "$APP_DIR/$APP_NAME.tmp" "$APP_DIR/$APP_NAME"
          REMOTE

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          APP_DIR="/www/wwwroot/wangkejava"
          APP_NAME="ruoyi-admin.jar"
          APP_PORT="8007"
          JAVA_HOME="/usr/lib/jvm/java-8-konajdk-8.0.25-1.oc9"
          LOG_FILE="$APP_DIR/logs/$APP_NAME.log"

          if [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "Java runtime not found at $JAVA_HOME"
            exit 1
          fi

          PID="$(pgrep -f "$APP_DIR/$APP_NAME" || true)"
          if [ -n "$PID" ]; then
            kill -TERM $PID
            for i in $(seq 1 30); do
              if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
          fi

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
            echo "old java process is still running"
            exit 1
          fi

          cd "$APP_DIR"
          nohup "$JAVA_HOME/bin/java" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            > "$LOG_FILE" 2>&1 &

          for i in $(seq 1 40); do
            if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
              echo "java process exited"
              tail -n 120 "$LOG_FILE" || true
              exit 1
            fi

            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "service started with http code $HTTP_CODE"
              exit 0
            fi
            sleep 2
          done

          echo "service did not respond on port $APP_PORT"
          tail -n 120 "$LOG_FILE" || true
          exit 1
          REMOTE
