name: Deploy Wangke Java Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-wangkejava-service
  cancel-in-progress: true

env:
  DEPLOY_HOST: 101.42.94.41
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  APP_DIR: /www/wwwroot/wangkejava
  APP_NAME: wangkejava.jar
  LEGACY_APP_NAME: ruoyi-admin.jar
  APP_PORT: "8007"
  SERVER_JAVA_HOME: /usr/lib/jvm/java-17-konajdk

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -pl ruoyi-admin -am package -DskipTests
          test -f "ruoyi-admin/target/$APP_NAME"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          : > ~/.ssh/known_hosts

      - name: Recover existing backend before upload
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          if ! timeout 4m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
            echo "backend process already running"
            exit 0
          fi

          if [ ! -f "$APP_DIR/$APP_NAME" ]; then
            echo "existing backend package not found, skip recovery"
            exit 0
          fi

          mkdir -p "$APP_DIR/logs" "$APP_DIR/uploadPath"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"
          JAVA_BIN=""
          if [ -x "$JAVA_HOME/bin/java" ]; then
            JAVA_BIN="$JAVA_HOME/bin/java"
          elif command -v java >/dev/null 2>&1; then
            JAVA_BIN="$(command -v java)"
          else
            echo "java runtime not found"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          if [ -n "$MYSQL_ROOT_PASSWORD" ]; then
            export SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$MYSQL_ROOT_PASSWORD"
          fi

          cd "$APP_DIR"
          nohup "$JAVA_BIN" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            > "$LOG_FILE" 2>&1 &

          for i in $(seq 1 45); do
            if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
              echo "java process exited during recovery"
              tail -n 80 "$LOG_FILE" || true
              exit 1
            fi
            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "existing backend recovered with http code $HTTP_CODE"
              exit 0
            fi
            sleep 2
          done

          echo "existing backend did not respond during recovery"
          tail -n 80 "$LOG_FILE" || true
          exit 1
          REMOTE
          then
            echo "backend recovery check failed or timed out, continue with upload retries"
          fi

      - name: Upload backend package
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SCP_OPTS="-O -i ~/.ssh/deploy_key -P $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          PACKAGE_PATH="ruoyi-admin/target/$APP_NAME"

          retry() {
            local max="$1"
            shift
            local i
            for i in $(seq 1 "$max"); do
              if "$@"; then
                return 0
              fi
              [ "$i" = "$max" ] && return 1
              sleep $((i * 10))
            done
          }

          echo "Creating remote release directory..."
          retry 6 timeout 90s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "rm -rf '$RELEASE_DIR/source' && mkdir -p '$RELEASE_DIR' '$APP_DIR/logs' '$APP_DIR/uploadPath'"
          if [ -f sql/ry_20250522.sql ]; then
            echo "Uploading database bootstrap SQL..."
            retry 4 timeout 2m scp $SCP_OPTS sql/ry_20250522.sql "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/ry_20250522.sql"
          fi

          PACKAGE_SHA="$(sha256sum "$PACKAGE_PATH" | awk '{print $1}')"
          PACKAGE_SIZE="$(stat -c%s "$PACKAGE_PATH")"
          du -h "$PACKAGE_PATH"
          PATCH_ZIP="backend-class-patch.zip"
          PATCH_MANIFEST="backend-class-patch.sha256"
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import zipfile

          class_root = Path("ruoyi-admin/target/classes")
          patch_dirs = [
              class_root / "com/ruoyi/web/controller/course",
              class_root / "com/ruoyi/common/utils/file",
          ]
          classes = sorted(
              path
              for source_dir in patch_dirs
              for path in source_dir.rglob("*.class")
          )
          if not classes:
              raise SystemExit("Backend class patch files were not found")

          manifest = []
          with zipfile.ZipFile("backend-class-patch.zip", "w", zipfile.ZIP_DEFLATED) as patch:
              for path in classes:
                  data = path.read_bytes()
                  archive_name = "BOOT-INF/classes/" + path.relative_to(class_root).as_posix()
                  patch.writestr(archive_name, data)
                  manifest.append(f"{hashlib.sha256(data).hexdigest()}  {archive_name}\n")

          Path("backend-class-patch.sha256").write_text("".join(manifest), encoding="utf-8")
          PY

          du -h "$PATCH_ZIP"
          echo "Uploading backend class patch..."
          retry 5 timeout 2m scp $SCP_OPTS "$PATCH_ZIP" "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/$PATCH_ZIP"
          retry 5 timeout 2m scp $SCP_OPTS "$PATCH_MANIFEST" "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/$PATCH_MANIFEST"

          echo "Installing backend class patch..."
          timeout 5m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' RELEASE_DIR='$RELEASE_DIR' PATCH_ZIP='$PATCH_ZIP' PATCH_MANIFEST='$PATCH_MANIFEST' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail
          if [ ! -f "$APP_DIR/$APP_NAME" ]; then
            echo "existing backend package not found"
            exit 1
          fi

          PATCH_ROOT="$RELEASE_DIR/class-patch"
          rm -rf "$PATCH_ROOT"
          mkdir -p "$PATCH_ROOT"
          python3 - "$RELEASE_DIR/$PATCH_ZIP" "$PATCH_ROOT" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as patch:
              patch.extractall(sys.argv[2])
          PY

          JAR_TOOL=""
          if [ -x "$JAVA_HOME/bin/jar" ]; then
            JAR_TOOL="$JAVA_HOME/bin/jar"
          elif command -v jar >/dev/null 2>&1; then
            JAR_TOOL="$(command -v jar)"
          else
            echo "jar command not found"
            exit 1
          fi

          cp "$APP_DIR/$APP_NAME" "$RELEASE_DIR/$APP_NAME.before-patch"
          cp "$APP_DIR/$APP_NAME" "$RELEASE_DIR/$APP_NAME"
          cd "$PATCH_ROOT"
          "$JAR_TOOL" uf "$RELEASE_DIR/$APP_NAME" $(cut -d' ' -f3- "$RELEASE_DIR/$PATCH_MANIFEST")

          python3 - "$RELEASE_DIR/$APP_NAME" "$RELEASE_DIR/$PATCH_MANIFEST" <<'PY'
          import hashlib
          import sys
          import zipfile

          jar_path, manifest_path = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(jar_path) as jar:
              for line in open(manifest_path, encoding="utf-8"):
                  expected, name = line.strip().split(None, 1)
                  actual = hashlib.sha256(jar.read(name)).hexdigest()
                  if actual != expected:
                      raise SystemExit(f"patch verification failed for {name}")
          PY

          cp "$RELEASE_DIR/$APP_NAME" "$APP_DIR/$APP_NAME.tmp"
          mv "$APP_DIR/$APP_NAME.tmp" "$APP_DIR/$APP_NAME"
          REMOTE
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"

      - name: Build release on server
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RELEASE_DIR:-}"
          echo "Release package has been uploaded to $APP_DIR/$APP_NAME"

      - name: Ensure database
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 3m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "RELEASE_DIR='$RELEASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          if [ -z "$MYSQL_ROOT_PASSWORD" ]; then
            echo "mysql root password not detected, skip database bootstrap"
            exit 0
          fi

          DB_EXISTS="$(MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -N -e "show databases like 'ha'" || true)"
          if [ "$DB_EXISTS" != "ha" ]; then
            test -f "$RELEASE_DIR/ry_20250522.sql"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -e "create database ha default character set utf8mb4 collate utf8mb4_general_ci"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot ha < "$RELEASE_DIR/ry_20250522.sql"
          fi
          REMOTE

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 6m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' LEGACY_APP_NAME='$LEGACY_APP_NAME' APP_PORT='$APP_PORT' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          SERVICE_NAME="wangkejava"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"

          mkdir -p "$APP_DIR/logs" "$APP_DIR/uploadPath"

          cat > "$APP_DIR/run-$SERVICE_NAME.sh" <<'RUNNER'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR="${APP_DIR:-/www/wwwroot/wangkejava}"
          APP_NAME="${APP_NAME:-wangkejava.jar}"
          APP_PORT="${APP_PORT:-8007}"
          JAVA_HOME="${JAVA_HOME:-/usr/lib/jvm/java-17-konajdk}"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"

          JAVA_BIN=""
          if [ -x "$JAVA_HOME/bin/java" ]; then
            JAVA_BIN="$JAVA_HOME/bin/java"
          elif command -v java >/dev/null 2>&1; then
            JAVA_BIN="$(command -v java)"
          else
            echo "java runtime not found" >> "$LOG_FILE"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          if [ -n "$MYSQL_ROOT_PASSWORD" ]; then
            export SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$MYSQL_ROOT_PASSWORD"
          fi

          cd "$APP_DIR"
          exec "$JAVA_BIN" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            >> "$LOG_FILE" 2>&1
          RUNNER
          chmod +x "$APP_DIR/run-$SERVICE_NAME.sh"

          cat > "/etc/systemd/system/$SERVICE_NAME.service" <<UNIT
          [Unit]
          Description=Wangke Java Service
          After=network-online.target mysql.service mysqld.service redis.service
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=$APP_DIR
          Environment=APP_DIR=$APP_DIR
          Environment=APP_NAME=$APP_NAME
          Environment=APP_PORT=$APP_PORT
          Environment=JAVA_HOME=$JAVA_HOME
          ExecStart=$APP_DIR/run-$SERVICE_NAME.sh
          Restart=always
          RestartSec=5
          SuccessExitStatus=143

          [Install]
          WantedBy=multi-user.target
          UNIT

          if command -v systemctl >/dev/null 2>&1 && [ -d /run/systemd/system ]; then
            systemctl stop "$SERVICE_NAME.service" >/dev/null 2>&1 || true
          fi

          for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
            [ -n "$app" ] || continue
            PID="$(pgrep -f "$APP_DIR/$app" || true)"
            if [ -n "$PID" ]; then
              kill -TERM $PID || true
            fi
          done

          for i in $(seq 1 30); do
            RUNNING=""
            for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
              [ -n "$app" ] || continue
              if pgrep -f "$APP_DIR/$app" >/dev/null 2>&1; then
                RUNNING=1
              fi
            done
            [ -z "$RUNNING" ] && break
            sleep 1
          done

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1 || pgrep -f "$APP_DIR/$LEGACY_APP_NAME" >/dev/null 2>&1; then
            echo "old java process is still running"
            exit 1
          fi

          if command -v systemctl >/dev/null 2>&1 && [ -d /run/systemd/system ]; then
            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME.service"
            systemctl restart "$SERVICE_NAME.service"
          else
            nohup "$APP_DIR/run-$SERVICE_NAME.sh" >/dev/null 2>&1 &
          fi

          for i in $(seq 1 60); do
            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "service started with http code $HTTP_CODE"
              exit 0
            fi

            if [ "$i" -gt 10 ] && command -v systemctl >/dev/null 2>&1 && systemctl is-failed --quiet "$SERVICE_NAME.service"; then
              systemctl status "$SERVICE_NAME.service" --no-pager || true
              echo "java service failed"
              tail -n 120 "$LOG_FILE" || true
              exit 1
            fi

            sleep 2
          done

          echo "service did not respond on port $APP_PORT"
          tail -n 120 "$LOG_FILE" || true
          exit 1
          REMOTE
