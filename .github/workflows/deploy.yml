name: Deploy Wangke Java Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-wangkejava-service
  cancel-in-progress: true

env:
  DEPLOY_HOST: 101.42.94.41
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  APP_DIR: /www/wwwroot/wangkejava
  APP_NAME: wangkejava.jar
  LEGACY_APP_NAME: ruoyi-admin.jar
  APP_PORT: "8007"
  SERVER_JAVA_HOME: /usr/lib/jvm/java-17-konajdk

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -pl ruoyi-admin -am package -DskipTests
          test -f "ruoyi-admin/target/$APP_NAME"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          : > ~/.ssh/known_hosts

      - name: Recover existing backend before upload
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          if ! timeout 4m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' APP_PORT='$APP_PORT' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
            echo "backend process already running"
            exit 0
          fi

          if [ ! -f "$APP_DIR/$APP_NAME" ]; then
            echo "existing backend package not found, skip recovery"
            exit 0
          fi

          mkdir -p "$APP_DIR/logs" "$APP_DIR/uploadPath"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"
          JAVA_BIN=""
          if [ -x "$JAVA_HOME/bin/java" ]; then
            JAVA_BIN="$JAVA_HOME/bin/java"
          elif command -v java >/dev/null 2>&1; then
            JAVA_BIN="$(command -v java)"
          else
            echo "java runtime not found"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import glob, json, os, re, subprocess, sys

          patterns = [
              r"(?im)^\s*(?:mysql_root|root_password|root_pwd|mysql_password|password|passwd|pwd)\s*[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:mysql|root)[^\n\r]{0,50}(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
          ]

          def valid(password):
              if password is None or not (0 <= len(password) <= 120):
                  return False
              env = os.environ.copy()
              if password:
                  env["MYSQL_PWD"] = password
              else:
                  env.pop("MYSQL_PWD", None)
              result = subprocess.run(
                  ["mysql", "-uroot", "-N", "-e", "select 1"],
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              return result.returncode == 0

          def add(candidate, values):
              if candidate is None:
                  return
              candidate = str(candidate).strip().strip("'\"")
              if 0 <= len(candidate) <= 120 and candidate not in values:
                  values.append(candidate)

          candidates = []
          add("", candidates)
          add("123456", candidates)

          paths = [
              "/root/.my.cnf",
              "/etc/my.cnf",
              "/etc/mysql/my.cnf",
              "/www/server/panel/config/config.json",
              "/www/server/panel/default.pl",
          ]
          for pattern in (
              "/www/server/panel/logs/installed/*.log",
              "/www/server/panel/logs/*.log",
              "/www/server/panel/data/*",
              "/www/server/panel/config/*",
          ):
              paths.extend(glob.glob(pattern))

          for path in dict.fromkeys(paths):
              if not os.path.isfile(path):
                  continue
              try:
                  text = open(path, errors="ignore").read()
              except Exception:
                  continue
              if path.endswith(".json"):
                  try:
                      def walk(value):
                          if isinstance(value, dict):
                              for key, child in value.items():
                                  if any(token in key.lower() for token in ("mysql", "root", "pass", "pwd")):
                                      add(child, candidates)
                                  walk(child)
                          elif isinstance(value, list):
                              for child in value:
                                  walk(child)
                      walk(json.loads(text))
                  except Exception:
                      pass
              for pattern in patterns:
                  for match in re.finditer(pattern, text):
                      add(match.group(1), candidates)

          for password in candidates:
              if valid(password):
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          if [ -f "$APP_DIR/.db.env" ]; then
            set -a
            . "$APP_DIR/.db.env"
            set +a
          fi
          if [ ! -f "$APP_DIR/.app.env" ]; then
            {
              printf 'RUOYI_TOKEN_SECRET='
              python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(48))
          PY
              printf 'RUOYI_DRUID_PASSWORD='
              python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(24))
          PY
            } > "$APP_DIR/.app.env"
            chmod 600 "$APP_DIR/.app.env"
          fi
          if [ -f "$APP_DIR/.app.env" ]; then
            set -a
            . "$APP_DIR/.app.env"
            set +a
          fi

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          DB_USERNAME="${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:-root}"
          DB_PASSWORD="${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:-$MYSQL_ROOT_PASSWORD}"
          APP_SECRET_ARGS=()
          if [ -n "${RUOYI_TOKEN_SECRET:-}" ]; then
            APP_SECRET_ARGS+=(--token.secret="$RUOYI_TOKEN_SECRET")
          fi
          if [ -n "${RUOYI_DRUID_PASSWORD:-}" ]; then
            APP_SECRET_ARGS+=(--spring.datasource.druid.stat-view-servlet.login-password="$RUOYI_DRUID_PASSWORD")
          fi
          DB_PASSWORD_ARGS=()
          DB_PASSWORD_ARGS=(
            --spring.datasource.druid.master.url="jdbc:mysql://127.0.0.1:3306/ha?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8"
            --spring.datasource.druid.master.username="$DB_USERNAME"
          )
          if [ -n "$DB_PASSWORD" ]; then
            export SPRING_DATASOURCE_DRUID_MASTER_USERNAME="$DB_USERNAME"
            export SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$DB_PASSWORD"
            DB_PASSWORD_ARGS+=(--spring.datasource.druid.master.password="$DB_PASSWORD")
            echo "database credentials detected for backend recovery"
          else
            echo "database credentials not detected for backend recovery"
          fi

          cd "$APP_DIR"
          nohup "$JAVA_BIN" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            "${DB_PASSWORD_ARGS[@]}" \
            "${APP_SECRET_ARGS[@]}" \
            > "$LOG_FILE" 2>&1 &

          for i in $(seq 1 45); do
            if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
              echo "java process exited during recovery"
              tail -n 80 "$LOG_FILE" || true
              exit 1
            fi
            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "existing backend recovered with http code $HTTP_CODE"
              exit 0
            fi
            sleep 2
          done

          echo "existing backend did not respond during recovery"
          tail -n 80 "$LOG_FILE" || true
          exit 1
          REMOTE
          then
            echo "backend recovery check failed or timed out, continue with upload retries"
          fi

      - name: Upload backend package
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          SCP_OPTS="-O -i ~/.ssh/deploy_key -P $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          PACKAGE_PATH="ruoyi-admin/target/$APP_NAME"

          retry() {
            local max="$1"
            shift
            local i
            for i in $(seq 1 "$max"); do
              if "$@"; then
                return 0
              fi
              [ "$i" = "$max" ] && return 1
              sleep $((i * 10))
            done
          }

          echo "Creating remote release directory..."
          retry 6 timeout 90s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "rm -rf '$RELEASE_DIR/source' && mkdir -p '$RELEASE_DIR' '$APP_DIR/logs' '$APP_DIR/uploadPath'"
          if [ -f sql/ry_20250522.sql ]; then
            echo "Uploading database bootstrap SQL..."
            retry 4 timeout 2m scp $SCP_OPTS sql/ry_20250522.sql "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/ry_20250522.sql"
          fi

          du -h "$PACKAGE_PATH"
          PATCH_ZIP="backend-class-patch.zip"
          PATCH_MANIFEST="backend-class-patch.sha256"
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import zipfile

          class_root = Path("ruoyi-admin/target/classes")
          patch_dirs = [
              class_root / "com/ruoyi/web/controller/course",
          ]
          classes = sorted(
              path
              for source_dir in patch_dirs
              for path in source_dir.rglob("*.class")
          )
          common_jars = sorted(Path("ruoyi-common/target").glob("ruoyi-common-*.jar"))
          common_jars = [path for path in common_jars if not path.name.startswith("original-")]
          if not classes:
              raise SystemExit("Backend class patch files were not found")
          if not common_jars:
              raise SystemExit("ruoyi-common jar was not found")

          manifest = []
          with zipfile.ZipFile("backend-class-patch.zip", "w", zipfile.ZIP_DEFLATED) as patch:
              for path in classes:
                  data = path.read_bytes()
                  archive_name = "BOOT-INF/classes/" + path.relative_to(class_root).as_posix()
                  patch.writestr(archive_name, data)
                  manifest.append(f"{hashlib.sha256(data).hexdigest()}  {archive_name}\n")

              common_jar = common_jars[0]
              data = common_jar.read_bytes()
              archive_name = f"BOOT-INF/lib/{common_jar.name}"
              patch.writestr(archive_name, data)
              manifest.append(f"{hashlib.sha256(data).hexdigest()}  {archive_name}\n")

          Path("backend-class-patch.sha256").write_text("".join(manifest), encoding="utf-8")
          PY

          du -h "$PATCH_ZIP"
          echo "Uploading backend class patch..."
          retry 5 timeout 2m scp $SCP_OPTS "$PATCH_ZIP" "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/$PATCH_ZIP"
          retry 5 timeout 2m scp $SCP_OPTS "$PATCH_MANIFEST" "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_DIR/$PATCH_MANIFEST"

          echo "Installing backend class patch..."
          timeout 5m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' RELEASE_DIR='$RELEASE_DIR' PATCH_ZIP='$PATCH_ZIP' PATCH_MANIFEST='$PATCH_MANIFEST' bash -s" <<'REMOTE'
          set -euo pipefail
          if [ ! -f "$APP_DIR/$APP_NAME" ]; then
            echo "existing backend package not found"
            exit 1
          fi

          PATCH_ROOT="$RELEASE_DIR/class-patch"
          rm -rf "$PATCH_ROOT"
          mkdir -p "$PATCH_ROOT"
          python3 - "$RELEASE_DIR/$PATCH_ZIP" "$PATCH_ROOT" <<'PY'
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as patch:
              patch.extractall(sys.argv[2])
          PY

          cp "$APP_DIR/$APP_NAME" "$RELEASE_DIR/$APP_NAME.before-patch"
          python3 - "$APP_DIR/$APP_NAME" "$RELEASE_DIR/$APP_NAME" "$PATCH_ROOT" "$RELEASE_DIR/$PATCH_MANIFEST" <<'PY'
          import pathlib
          import sys
          import zipfile

          source_path, target_path, patch_root, manifest_path = sys.argv[1:]
          patch_root = pathlib.Path(patch_root)
          patch_names = []
          patch_data = {}
          with open(manifest_path, encoding="utf-8") as manifest:
              for line in manifest:
                  if not line.strip():
                      continue
                  _, name = line.strip().split(None, 1)
                  patch_names.append(name)
                  patch_data[name] = (patch_root / name).read_bytes()

          def copy_info(info, name):
              new_info = zipfile.ZipInfo(name, info.date_time)
              new_info.comment = info.comment
              new_info.extra = info.extra
              new_info.internal_attr = info.internal_attr
              new_info.external_attr = info.external_attr
              new_info.create_system = info.create_system
              new_info.compress_type = (
                  zipfile.ZIP_STORED
                  if name.startswith("BOOT-INF/lib/") and name.endswith(".jar")
                  else info.compress_type
              )
              return new_info

          written = set()
          with zipfile.ZipFile(source_path, "r") as source, zipfile.ZipFile(target_path, "w", allowZip64=True) as target:
              for info in source.infolist():
                  name = info.filename
                  data = patch_data.pop(name, None)
                  if data is None:
                      data = source.read(name)
                  target.writestr(copy_info(info, name), data)
                  written.add(name)

              for name, data in patch_data.items():
                  info = zipfile.ZipInfo(name)
                  info.compress_type = (
                      zipfile.ZIP_STORED
                      if name.startswith("BOOT-INF/lib/") and name.endswith(".jar")
                      else zipfile.ZIP_DEFLATED
                  )
                  target.writestr(info, data)
                  written.add(name)

          missing = [name for name in patch_names if name not in written]
          if missing:
              raise SystemExit("patch entries missing after rewrite: " + ", ".join(missing))
          PY

          python3 - "$RELEASE_DIR/$APP_NAME" "$RELEASE_DIR/$PATCH_MANIFEST" <<'PY'
          import hashlib
          import sys
          import zipfile

          jar_path, manifest_path = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(jar_path) as jar:
              for line in open(manifest_path, encoding="utf-8"):
                  expected, name = line.strip().split(None, 1)
                  actual = hashlib.sha256(jar.read(name)).hexdigest()
                  if actual != expected:
                      raise SystemExit(f"patch verification failed for {name}")
          PY

          cp "$RELEASE_DIR/$APP_NAME" "$APP_DIR/$APP_NAME.tmp"
          mv "$APP_DIR/$APP_NAME.tmp" "$APP_DIR/$APP_NAME"
          REMOTE
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"

      - name: Build release on server
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RELEASE_DIR:-}"
          echo "Release package has been uploaded to $APP_DIR/$APP_NAME"

      - name: Ensure database
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 3m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "RELEASE_DIR='$RELEASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          get_mysql_root_password() {
            python3 - <<'PY'
          import glob, json, os, re, subprocess, sys

          patterns = [
              r"(?im)^\s*(?:mysql_root|root_password|root_pwd|mysql_password|password|passwd|pwd)\s*[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:mysql|root)[^\n\r]{0,50}(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
          ]

          def valid(password):
              if password is None or not (0 <= len(password) <= 120):
                  return False
              env = os.environ.copy()
              if password:
                  env["MYSQL_PWD"] = password
              else:
                  env.pop("MYSQL_PWD", None)
              result = subprocess.run(
                  ["mysql", "-uroot", "-N", "-e", "select 1"],
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              return result.returncode == 0

          def add(candidate, values):
              if candidate is None:
                  return
              candidate = str(candidate).strip().strip("'\"")
              if 0 <= len(candidate) <= 120 and candidate not in values:
                  values.append(candidate)

          candidates = []
          add("", candidates)
          add("123456", candidates)

          paths = [
              "/root/.my.cnf",
              "/etc/my.cnf",
              "/etc/mysql/my.cnf",
              "/www/server/panel/config/config.json",
              "/www/server/panel/default.pl",
          ]
          for pattern in (
              "/www/server/panel/logs/installed/*.log",
              "/www/server/panel/logs/*.log",
              "/www/server/panel/data/*",
              "/www/server/panel/config/*",
          ):
              paths.extend(glob.glob(pattern))

          for path in dict.fromkeys(paths):
              if not os.path.isfile(path):
                  continue
              try:
                  text = open(path, errors="ignore").read()
              except Exception:
                  continue
              if path.endswith(".json"):
                  try:
                      def walk(value):
                          if isinstance(value, dict):
                              for key, child in value.items():
                                  if any(token in key.lower() for token in ("mysql", "root", "pass", "pwd")):
                                      add(child, candidates)
                                  walk(child)
                          elif isinstance(value, list):
                              for child in value:
                                  walk(child)
                      walk(json.loads(text))
                  except Exception:
                      pass
              for pattern in patterns:
                  for match in re.finditer(pattern, text):
                      add(match.group(1), candidates)

          for password in candidates:
              if valid(password):
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          mysql_tcp_ready() {
            mysqladmin -h127.0.0.1 -P3306 ping --silent >/dev/null 2>&1
          }

          start_mysql_service() {
            for svc in mysqld mysql mariadb; do
              systemctl start "$svc" >/dev/null 2>&1 || true
              service "$svc" start >/dev/null 2>&1 || true
              [ -x "/etc/init.d/$svc" ] && "/etc/init.d/$svc" start >/dev/null 2>&1 || true
            done
            [ -x /www/server/mysql/bin/mysql.server ] && /www/server/mysql/bin/mysql.server start >/dev/null 2>&1 || true
          }

          stop_mysql_service() {
            for svc in mysqld mysql mariadb; do
              systemctl stop "$svc" >/dev/null 2>&1 || true
              service "$svc" stop >/dev/null 2>&1 || true
              [ -x "/etc/init.d/$svc" ] && "/etc/init.d/$svc" stop >/dev/null 2>&1 || true
            done
            [ -x /www/server/mysql/bin/mysql.server ] && /www/server/mysql/bin/mysql.server stop >/dev/null 2>&1 || true
          }

          wait_for_mysql_tcp() {
            for i in $(seq 1 60); do
              if mysql_tcp_ready; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          start_mysql_service
          wait_for_mysql_tcp || true

          APP_DIR="/www/wwwroot/wangkejava"
          APP_DB_ENV="$APP_DIR/.db.env"
          APP_DB_USER="wangke_app"

          if [ -f "$APP_DB_ENV" ]; then
            set -a
            . "$APP_DB_ENV"
            set +a
            if [ -n "${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:-}" ] && MYSQL_PWD="$SPRING_DATASOURCE_DRUID_MASTER_PASSWORD" mysql -h127.0.0.1 -P3306 -u"${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:-$APP_DB_USER}" -N -e "select 1" ha >/dev/null 2>&1; then
              echo "existing app database credentials are valid"
              exit 0
            fi
          fi

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          if [ -z "$MYSQL_ROOT_PASSWORD" ]; then
            echo "mysql root password not detected, repairing app database credentials"
            mkdir -p "$APP_DIR"
            APP_DB_PASSWORD="$(python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(24))
          PY
          )"

            MYSQL_SERVICE=""
            for svc in mysqld mysql mariadb; do
              if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
                MYSQL_SERVICE="$svc"
                break
              fi
            done
            [ -n "$MYSQL_SERVICE" ] || MYSQL_SERVICE="mysqld"

            MYSQLD_SAFE="$(command -v mysqld_safe || true)"
            if [ -z "$MYSQLD_SAFE" ]; then
              MYSQLD_SAFE="$(find /www/server/mysql /usr/local/mysql /usr -name mysqld_safe -type f 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "$MYSQLD_SAFE" ]; then
              echo "mysqld_safe not found, skip database bootstrap"
              exit 0
            fi

            stop_mysql_service
            sleep 5
            nohup "$MYSQLD_SAFE" --skip-grant-tables --skip-networking >/tmp/wangke-mysql-repair.log 2>&1 &
            for i in $(seq 1 45); do
              if mysql -uroot -N -e "select 1" >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
            if ! mysql -uroot -N -e "select 1" >/dev/null 2>&1; then
              echo "mysql repair mode did not start"
              tail -n 80 /tmp/wangke-mysql-repair.log || true
              mysqladmin -uroot shutdown >/dev/null 2>&1 || true
              start_mysql_service
              exit 0
            fi

            DB_EXISTS="$(mysql -uroot -N -e "show databases like 'ha'" || true)"
            mysql -uroot <<SQL
          FLUSH PRIVILEGES;
          CREATE DATABASE IF NOT EXISTS ha DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
          CREATE USER IF NOT EXISTS '$APP_DB_USER'@'localhost' IDENTIFIED BY '$APP_DB_PASSWORD';
          ALTER USER '$APP_DB_USER'@'localhost' IDENTIFIED BY '$APP_DB_PASSWORD';
          GRANT ALL PRIVILEGES ON ha.* TO '$APP_DB_USER'@'localhost';
          FLUSH PRIVILEGES;
          SQL

            if [ "$DB_EXISTS" != "ha" ] && [ -f "$RELEASE_DIR/ry_20250522.sql" ]; then
              mysql -uroot ha < "$RELEASE_DIR/ry_20250522.sql"
            fi

            mysqladmin -uroot shutdown >/dev/null 2>&1 || true
            sleep 5
            start_mysql_service
            wait_for_mysql_tcp || true
            for i in $(seq 1 60); do
              if MYSQL_PWD="$APP_DB_PASSWORD" mysql -h127.0.0.1 -P3306 -u"$APP_DB_USER" -N -e "select 1" ha >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
            if MYSQL_PWD="$APP_DB_PASSWORD" mysql -h127.0.0.1 -P3306 -u"$APP_DB_USER" -N -e "select 1" ha >/dev/null 2>&1; then
              cat > "$APP_DB_ENV" <<EOF
          SPRING_DATASOURCE_DRUID_MASTER_USERNAME=$APP_DB_USER
          SPRING_DATASOURCE_DRUID_MASTER_PASSWORD=$APP_DB_PASSWORD
          EOF
              chmod 600 "$APP_DB_ENV"
              echo "app database credentials repaired"
              exit 0
            fi

            echo "app database credential repair failed"
            systemctl status mysqld mysql mariadb --no-pager || true
            tail -n 80 /www/server/mysql/data/*.err 2>/dev/null || true
            exit 0
          fi

          DB_EXISTS="$(MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h127.0.0.1 -P3306 -uroot -N -e "show databases like 'ha'" || true)"
          if [ "$DB_EXISTS" != "ha" ]; then
            test -f "$RELEASE_DIR/ry_20250522.sql"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h127.0.0.1 -P3306 -uroot -e "create database ha default character set utf8mb4 collate utf8mb4_general_ci"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -h127.0.0.1 -P3306 -uroot ha < "$RELEASE_DIR/ry_20250522.sql"
          fi
          REMOTE

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -o ConnectTimeout=60 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          timeout 6m ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' LEGACY_APP_NAME='$LEGACY_APP_NAME' APP_PORT='$APP_PORT' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail

          SERVICE_NAME="wangkejava"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"

          mkdir -p "$APP_DIR/logs" "$APP_DIR/uploadPath"

          cat > "$APP_DIR/run-$SERVICE_NAME.sh" <<'RUNNER'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR="${APP_DIR:-/www/wwwroot/wangkejava}"
          APP_NAME="${APP_NAME:-wangkejava.jar}"
          APP_PORT="${APP_PORT:-8007}"
          JAVA_HOME="${JAVA_HOME:-/usr/lib/jvm/java-17-konajdk}"
          LOG_FILE="$APP_DIR/logs/${APP_NAME%.jar}.log"

          JAVA_BIN=""
          if [ -x "$JAVA_HOME/bin/java" ]; then
            JAVA_BIN="$JAVA_HOME/bin/java"
          elif command -v java >/dev/null 2>&1; then
            JAVA_BIN="$(command -v java)"
          else
            echo "java runtime not found" >> "$LOG_FILE"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import glob, json, os, re, subprocess, sys

          patterns = [
              r"(?im)^\s*(?:mysql_root|root_password|root_pwd|mysql_password|password|passwd|pwd)\s*[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:mysql|root)[^\n\r]{0,50}(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
              r"(?i)(?:password|passwd|pwd)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)",
          ]

          def valid(password):
              if password is None or not (0 <= len(password) <= 120):
                  return False
              env = os.environ.copy()
              if password:
                  env["MYSQL_PWD"] = password
              else:
                  env.pop("MYSQL_PWD", None)
              result = subprocess.run(
                  ["mysql", "-uroot", "-N", "-e", "select 1"],
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              return result.returncode == 0

          def add(candidate, values):
              if candidate is None:
                  return
              candidate = str(candidate).strip().strip("'\"")
              if 0 <= len(candidate) <= 120 and candidate not in values:
                  values.append(candidate)

          candidates = []
          add("", candidates)
          add("123456", candidates)

          paths = [
              "/root/.my.cnf",
              "/etc/my.cnf",
              "/etc/mysql/my.cnf",
              "/www/server/panel/config/config.json",
              "/www/server/panel/default.pl",
          ]
          for pattern in (
              "/www/server/panel/logs/installed/*.log",
              "/www/server/panel/logs/*.log",
              "/www/server/panel/data/*",
              "/www/server/panel/config/*",
          ):
              paths.extend(glob.glob(pattern))

          for path in dict.fromkeys(paths):
              if not os.path.isfile(path):
                  continue
              try:
                  text = open(path, errors="ignore").read()
              except Exception:
                  continue
              if path.endswith(".json"):
                  try:
                      def walk(value):
                          if isinstance(value, dict):
                              for key, child in value.items():
                                  if any(token in key.lower() for token in ("mysql", "root", "pass", "pwd")):
                                      add(child, candidates)
                                  walk(child)
                          elif isinstance(value, list):
                              for child in value:
                                  walk(child)
                      walk(json.loads(text))
                  except Exception:
                      pass
              for pattern in patterns:
                  for match in re.finditer(pattern, text):
                      add(match.group(1), candidates)

          for password in candidates:
              if valid(password):
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          if [ -f "$APP_DIR/.db.env" ]; then
            set -a
            . "$APP_DIR/.db.env"
            set +a
          fi
          if [ ! -f "$APP_DIR/.app.env" ]; then
            {
              printf 'RUOYI_TOKEN_SECRET='
              python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(48))
          PY
              printf 'RUOYI_DRUID_PASSWORD='
              python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(24))
          PY
            } > "$APP_DIR/.app.env"
            chmod 600 "$APP_DIR/.app.env"
          fi
          if [ -f "$APP_DIR/.app.env" ]; then
            set -a
            . "$APP_DIR/.app.env"
            set +a
          fi

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password || true)"
          DB_USERNAME="${SPRING_DATASOURCE_DRUID_MASTER_USERNAME:-root}"
          DB_PASSWORD="${SPRING_DATASOURCE_DRUID_MASTER_PASSWORD:-$MYSQL_ROOT_PASSWORD}"
          APP_SECRET_ARGS=()
          if [ -n "${RUOYI_TOKEN_SECRET:-}" ]; then
            APP_SECRET_ARGS+=(--token.secret="$RUOYI_TOKEN_SECRET")
          fi
          if [ -n "${RUOYI_DRUID_PASSWORD:-}" ]; then
            APP_SECRET_ARGS+=(--spring.datasource.druid.stat-view-servlet.login-password="$RUOYI_DRUID_PASSWORD")
          fi
          DB_PASSWORD_ARGS=()
          DB_PASSWORD_ARGS=(
            --spring.datasource.druid.master.url="jdbc:mysql://127.0.0.1:3306/ha?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8"
            --spring.datasource.druid.master.username="$DB_USERNAME"
          )
          if [ -n "$DB_PASSWORD" ]; then
            export SPRING_DATASOURCE_DRUID_MASTER_USERNAME="$DB_USERNAME"
            export SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$DB_PASSWORD"
            DB_PASSWORD_ARGS+=(--spring.datasource.druid.master.password="$DB_PASSWORD")
            echo "database credentials detected for backend startup"
          else
            echo "database credentials not detected for backend startup"
          fi

          cd "$APP_DIR"
          exec "$JAVA_BIN" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            "${DB_PASSWORD_ARGS[@]}" \
            "${APP_SECRET_ARGS[@]}" \
            >> "$LOG_FILE" 2>&1
          RUNNER
          chmod +x "$APP_DIR/run-$SERVICE_NAME.sh"

          cat > "/etc/systemd/system/$SERVICE_NAME.service" <<UNIT
          [Unit]
          Description=Wangke Java Service
          After=network-online.target mysql.service mysqld.service redis.service
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=$APP_DIR
          Environment=APP_DIR=$APP_DIR
          Environment=APP_NAME=$APP_NAME
          Environment=APP_PORT=$APP_PORT
          Environment=JAVA_HOME=$JAVA_HOME
          ExecStart=$APP_DIR/run-$SERVICE_NAME.sh
          Restart=always
          RestartSec=5
          SuccessExitStatus=143

          [Install]
          WantedBy=multi-user.target
          UNIT

          if command -v systemctl >/dev/null 2>&1 && [ -d /run/systemd/system ]; then
            systemctl stop "$SERVICE_NAME.service" >/dev/null 2>&1 || true
          fi

          for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
            [ -n "$app" ] || continue
            PID="$(pgrep -f "$APP_DIR/$app" || true)"
            if [ -n "$PID" ]; then
              kill -TERM $PID || true
            fi
          done

          for i in $(seq 1 30); do
            RUNNING=""
            for app in "$APP_NAME" "$LEGACY_APP_NAME"; do
              [ -n "$app" ] || continue
              if pgrep -f "$APP_DIR/$app" >/dev/null 2>&1; then
                RUNNING=1
              fi
            done
            [ -z "$RUNNING" ] && break
            sleep 1
          done

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1 || pgrep -f "$APP_DIR/$LEGACY_APP_NAME" >/dev/null 2>&1; then
            echo "old java process is still running"
            exit 1
          fi

          mysql_tcp_ready() {
            mysqladmin -h127.0.0.1 -P3306 ping --silent >/dev/null 2>&1
          }

          start_mysql_service() {
            for svc in mysqld mysql mariadb; do
              systemctl start "$svc" >/dev/null 2>&1 || true
              service "$svc" start >/dev/null 2>&1 || true
              [ -x "/etc/init.d/$svc" ] && "/etc/init.d/$svc" start >/dev/null 2>&1 || true
            done
            [ -x /www/server/mysql/bin/mysql.server ] && /www/server/mysql/bin/mysql.server start >/dev/null 2>&1 || true
          }

          start_mysql_service
          for i in $(seq 1 60); do
            if mysql_tcp_ready; then
              break
            fi
            sleep 2
          done

          if ! mysql_tcp_ready; then
            echo "mysql did not start listening on 127.0.0.1:3306"
            systemctl status mysqld mysql mariadb --no-pager || true
            tail -n 80 /www/server/mysql/data/*.err 2>/dev/null || true
            exit 1
          fi

          if command -v systemctl >/dev/null 2>&1 && [ -d /run/systemd/system ]; then
            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME.service"
            systemctl restart "$SERVICE_NAME.service"
          else
            nohup "$APP_DIR/run-$SERVICE_NAME.sh" >/dev/null 2>&1 &
          fi

          for i in $(seq 1 60); do
            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "service started with http code $HTTP_CODE"
              exit 0
            fi

            if [ "$i" -gt 10 ] && command -v systemctl >/dev/null 2>&1 && systemctl is-failed --quiet "$SERVICE_NAME.service"; then
              systemctl status "$SERVICE_NAME.service" --no-pager || true
              echo "java service failed"
              tail -n 120 "$LOG_FILE" || true
              exit 1
            fi

            sleep 2
          done

          echo "service did not respond on port $APP_PORT"
          tail -n 120 "$LOG_FILE" || true
          exit 1
          REMOTE
