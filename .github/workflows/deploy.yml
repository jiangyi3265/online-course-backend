name: Deploy Java Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-java-service
  cancel-in-progress: true

env:
  DEPLOY_HOST: 101.42.94.41
  DEPLOY_USER: root
  DEPLOY_PORT: "22"
  APP_DIR: /www/wwwroot/wangkejava
  APP_NAME: ruoyi-admin.jar
  APP_PORT: "8007"
  SERVER_JAVA_HOME: /usr/lib/jvm/java-17-konajdk

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/deploy_key <<'SSH_KEY'
          ${{ secrets.SERVER_SSH_KEY }}
          SSH_KEY
          grep -q "PRIVATE KEY" ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload source
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          SRC_DIR="$APP_DIR/releases/$GITHUB_SHA"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$SRC_DIR' '$APP_DIR/logs' '$APP_DIR/uploadPath'"
          git archive --format=tar.gz HEAD | timeout 120s ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$SRC_DIR'"
          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"

      - name: Build jar on server
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' SRC_DIR='$SRC_DIR' JAVA_HOME='$SERVER_JAVA_HOME' bash -s" <<'REMOTE'
          set -euo pipefail
          export PATH="$JAVA_HOME/bin:$PATH"

          if [ ! -x "$JAVA_HOME/bin/javac" ]; then
            echo "JDK not found at $JAVA_HOME"
            exit 1
          fi
          if ! command -v mvn >/dev/null 2>&1; then
            echo "mvn command not found on server"
            exit 1
          fi

          cd "$SRC_DIR"
          mvn -B -pl ruoyi-admin -am package -DskipTests
          cp "ruoyi-admin/target/$APP_NAME" "$APP_DIR/$APP_NAME.tmp"
          mv "$APP_DIR/$APP_NAME.tmp" "$APP_DIR/$APP_NAME"
          REMOTE

      - name: Ensure database
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "SRC_DIR='$SRC_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password)"
          DB_EXISTS="$(MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -N -e "show databases like 'ha'" || true)"
          if [ "$DB_EXISTS" != "ha" ]; then
            test -f "$SRC_DIR/sql/ry_20250522.sql"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot -e "create database ha default character set utf8mb4 collate utf8mb4_general_ci"
            MYSQL_PWD="$MYSQL_ROOT_PASSWORD" mysql -uroot ha < "$SRC_DIR/sql/ry_20250522.sql"
          fi
          REMOTE

      - name: Restart service
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/deploy_key -p $DEPLOY_PORT -o IdentitiesOnly=yes -o BatchMode=yes"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          APP_DIR="/www/wwwroot/wangkejava"
          APP_NAME="ruoyi-admin.jar"
          APP_PORT="8007"
          JAVA_HOME="/usr/lib/jvm/java-17-konajdk"
          LOG_FILE="$APP_DIR/logs/$APP_NAME.log"

          if [ ! -x "$JAVA_HOME/bin/java" ]; then
            echo "Java runtime not found at $JAVA_HOME"
            exit 1
          fi

          get_mysql_root_password() {
            python3 - <<'PY'
          import os, re, subprocess, sys
          log = "/www/server/panel/logs/installed/mysql-8.4_1775550897.log"
          pattern = r"(?i)(?:password|passwd|pwd|root)[^\n\r:=]{0,30}[:=]\s*['\"]?([^'\"\s,;]+)"
          if not os.path.exists(log):
              sys.exit(1)
          text = open(log, errors="ignore").read()
          for match in re.finditer(pattern, text):
              password = match.group(1).strip()
              if not (3 <= len(password) <= 80):
                  continue
              env = os.environ.copy()
              env["MYSQL_PWD"] = password
              result = subprocess.run(["mysql", "-uroot", "-e", "select 1"], env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              if result.returncode == 0:
                  print(password)
                  sys.exit(0)
          sys.exit(1)
          PY
          }

          MYSQL_ROOT_PASSWORD="$(get_mysql_root_password)"

          PID="$(pgrep -f "$APP_DIR/$APP_NAME" || true)"
          if [ -n "$PID" ]; then
            kill -TERM $PID
            for i in $(seq 1 30); do
              if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
          fi

          if pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
            echo "old java process is still running"
            exit 1
          fi

          cd "$APP_DIR"
          SPRING_DATASOURCE_DRUID_MASTER_PASSWORD="$MYSQL_ROOT_PASSWORD" nohup "$JAVA_HOME/bin/java" \
            -Dname="$APP_NAME" \
            -Duser.timezone=Asia/Shanghai \
            -Xms512m \
            -Xmx1024m \
            -jar "$APP_DIR/$APP_NAME" \
            --ruoyi.profile="$APP_DIR/uploadPath" \
            --server.port="$APP_PORT" \
            > "$LOG_FILE" 2>&1 &

          for i in $(seq 1 40); do
            if ! pgrep -f "$APP_DIR/$APP_NAME" >/dev/null 2>&1; then
              echo "java process exited"
              tail -n 120 "$LOG_FILE" || true
              exit 1
            fi

            HTTP_CODE="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:$APP_PORT/" || true)"
            if [ "$HTTP_CODE" != "000" ]; then
              echo "service started with http code $HTTP_CODE"
              exit 0
            fi
            sleep 2
          done

          echo "service did not respond on port $APP_PORT"
          tail -n 120 "$LOG_FILE" || true
          exit 1
          REMOTE
